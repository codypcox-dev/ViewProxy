<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ViewProxy</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #stage {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #view {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      background: #000;
      margin: 0;
      padding: 0;
      border: 0;
      vertical-align: top;
      pointer-events: none; /* hit layer on top in focus mode */
    }
    #hit {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: transparent;
      outline: none;
      pointer-events: none; /* enabled in focus mode via JS */
    }
    body.focus-mode #hit {
      pointer-events: auto;
      cursor: default;
    }
    #meta {
      position: fixed;
      left: 6px;
      bottom: 6px;
      z-index: 3;
      font: 700 10px/1.2 ui-monospace, Consolas, monospace;
      color: #facc15;
      background: rgba(0, 0, 0, 0.65);
      padding: 4px 6px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #meta.fade { opacity: 0; }
    #exit {
      position: fixed;
      top: 6px;
      right: 6px;
      z-index: 4;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(15,23,42,0.9);
      color: #f8fafc;
      font: 700 11px/1 system-ui,sans-serif;
      padding: 7px 10px;
      cursor: pointer;
      opacity: 0.45;
      transition: opacity 0.15s ease;
    }
    #exit:hover {
      opacity: 1;
      background: rgba(127,29,29,0.95);
    }
  </style>
</head>
<body>
  <div id="stage">
    <img id="view" alt="" draggable="false" />
    <div id="hit" tabindex="0" aria-label="ViewProxy interactive surface"></div>
  </div>
  <div id="meta">waiting…</div>
  <button type="button" id="exit" hidden>✕ Exit Focus</button>
  <script src="proxy.js"></script>
</body>
</html>
