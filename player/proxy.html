<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ViewProxy</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #view {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      background: #000;
      margin: 0;
      padding: 0;
      border: 0;
      vertical-align: top;
    }
    #meta {
      position: fixed;
      left: 6px;
      bottom: 6px;
      z-index: 2;
      font: 700 10px/1.2 ui-monospace, Consolas, monospace;
      color: #facc15;
      background: rgba(0, 0, 0, 0.65);
      padding: 4px 6px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #meta.fade { opacity: 0; }
  </style>
</head>
<body>
  <img id="view" alt="" draggable="false" />
  <div id="meta">waiting…</div>
  <script src="proxy.js"></script>
</body>
</html>
